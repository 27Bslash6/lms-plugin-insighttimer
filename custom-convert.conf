#
# Insight Timer HLS transcoding via ffmpeg
#
# Stream URL is the HLS .m3u8 URL. ffmpeg fetches and transcodes to FLAC.
# R: flag = remote input, PATH=%F = full URL passed to ffmpeg -i
#

m3u8 flc * *
	# R:{PATH=%F}T:{START=-ss %t}
	[ffmpeg] -v 0 -vn $START$ -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 5 -protocol_whitelist http,https,tcp,tls -i $PATH$ -c:a flac -f flac -
