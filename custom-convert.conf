#
# Insight Timer HLS transcoding via ffmpeg
#
# The .m3u8 temp file contains the HLS URL as text.
# ffmpeg reads the URL from the file, fetches HLS segments, and outputs FLAC.
#

m3u8 flc * *
	# F:{PATH=%f}R:{PATH=%F}T:{START=-ss %t}
	[ffmpeg] -v 0 -vn $START$ -protocol_whitelist file,http,https,tcp,tls -i $PATH$ -acodec copy -f flac -
